version: "3.9"

# ─────────────────────────────────────────────────────────────
#  PyOutage — Power Cut Tracker
#
#  To change plug IP without editing this file:
#    → Open dashboard → Settings tab → change Plug IP → Save
#    → Poller reloads automatically, no restart needed
#
#  To change plug IP here (default before first run):
#    → Edit config.json in the repo root
# ─────────────────────────────────────────────────────────────

networks:
  pyoutage-net:
    driver: bridge

volumes:
  pyoutage-data:

services:

  poller:
    build:
      context: ./poller
    container_name: pyoutage-poller
    restart: unless-stopped
    network_mode: host
    environment:
      DB_PATH:     "/data/pyoutage.db"
      CONFIG_PATH: "/data/config.json"
      HOOKS_DIR:   "/hooks"
      TZ:          "Asia/Kolkata"
    volumes:
      - pyoutage-data:/data
      - ./on_power_off:/hooks/on_power_off
      - ./on_power_on:/hooks/on_power_on

  web:
    build:
      context: ./web
    container_name: pyoutage-web
    restart: unless-stopped
    networks:
      - pyoutage-net
    ports:
      - "5000:5000"
    environment:
      DB_PATH:     "/data/pyoutage.db"
      CONFIG_PATH: "/data/config.json"
      TZ:          "Asia/Kolkata"
    volumes:
      - pyoutage-data:/data
    depends_on:
      - poller
